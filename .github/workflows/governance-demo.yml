name: Continuous Governance

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  governance:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip intsall -r requirements.txt

      - name: Debug Telemetry Package
        run: |
          pwd
          ls -R
          echo "------ emitter.py ------"
          cat telemetry/emitter.py

      - name: Emit Pipeline Started
        run: |
          python -m telemetry.emitter sc.pipeline.started

      # Future: Dependency Scan
      # Future: SBOM Generation
      # Future: Policy Checks

      - name: Emit Pipeline Completed
        if: always()
        run: |
          python -m telemetry.emitter sc.pipeline.completed

      
      
      - name: Test Python
        run: |
           python -c "print('Hello from GitHub Actions')"